configs:
  mosquitto_config:
    content: |
      persistence false
      allow_anonymous true
      listener 1883
      listener_allow_anonymous true

  prometheus_config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s
      scrape_configs:
        - job_name: 'prometheus'
          static_configs:
            - targets: ['127.0.0.1:9090']

        - job_name: 'grafana'
          static_configs:
            - targets: ['grafana:3000']

        - job_name: sophisticated
          static_configs:
            - targets: ['bot-node:9067']

volumes:
  prometheus-data:
  grafana-data:
  sophisticated-data:

services:
  mqtt-server:
    restart: unless-stopped
    image: eclipse-mosquitto:2.1.0-alpine
    configs:
      - source: mosquitto_config
        target: /mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"

  prometheus:
    image: prom/prometheus:v3.11.3
    restart: always
    volumes:
      - prometheus-data:/prometheus
    configs:
      - source: prometheus_config
        target: /prometheus.yaml
    command:
      - --config.file=/prometheus.yaml
      - --web.enable-lifecycle
      - --storage.tsdb.retention.time=90d
    ports:
     - "9090:9090"

  grafana:
    image: grafana/grafana:main
    restart: always
    volumes:
      - grafana-data:/var/lib/grafana
      - ../dashboards/meshtastic.json:/var/lib/grafana/dashboards/meshtastic.json:ro
      - ./grafana/datasource.yaml:/etc/grafana/provisioning/datasources/prometheus.yaml:ro
      - ./grafana/dashboard.yaml:/etc/grafana/provisioning/dashboards/filesystem.yaml:ro
    ports:
     - "3000:3000"

  bot-node:
    restart: unless-stopped
    depends_on:
      - mqtt-server
      - prometheus
    build:
      context: ../
    command:
      - "--config"
      - "/config.yaml"
    volumes:
      - sophisticated-data:/data
      - ./config.yaml:/config.yaml
    ports:
     - "9067:9067"